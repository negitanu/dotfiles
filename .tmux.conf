# ----------------------------------------------------------------------------
# file    : .tmux.conf
# brief   : tmux configuration file.
# module  : dotfiles

# author  : Teppei Kobayashi <tkobayashi@kirisame.tech>
# date    : 2025/08/20
# ----------------------------------------------------------------------------


# ----------------------------------------------------------------------------
# brief   : general configuration.
# note    : -
# ----------------------------------------------------------------------------
set-option -g default-shell /usr/bin/zsh
set-option -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Enable mouse support
set -g mouse on

set-option -g status-interval 1
set-option -g status-justify left


# ----------------------------------------------------------------------------
# brief   : keybind configuration.
# note    : -
# ----------------------------------------------------------------------------
# prefix key
set -g prefix C-t
unbind b

# key delay
set -sg escape-time 0

# keybinds
bind r source-file ~/.tmux.conf \; display "Configuration reloaded."
bind | split-window -hc "#{pane_current_path}"
bind - split-window -vc "#{pane_current_path}"
bind n select-pane -D
bind p select-pane -U
bind f select-pane -R
bind b select-pane -L


# ----------------------------------------------------------------------------
# brief   : appearance configuration.
# note    : solarized dark, dependence terminal system color conf.
# ----------------------------------------------------------------------------
# start index number from 1
set -g base-index 1
set -g pane-base-index 1

# statusbar (basic settings for powerline compatibility)
set-option -g status-position top
set-option -g status-left-length 60
set-option -g status-right-length 120

# pane border
set-option -g pane-border-style fg=black
set-option -g pane-active-border-style fg=yellow

# message text
set-option -g message-style bg=black,fg=red

# pane number display
set-option -g display-panes-active-colour blue
set-option -g display-panes-colour yellow

# Window monitoring
set-window-option -g monitor-activity on
set-option -g visual-activity off

# Clock mode
set-window-option -g clock-mode-colour cyan
set-window-option -g clock-mode-style 24

# powerline
run-shell "powerline-config tmux setup"
