# ----------------------------------------------------------------------------
# file    : .tmux.conf
# brief   : tmux configuration file.
# module  : dotfiles

# author  : Teppei Kobayashi <tkobayashi@kirisame.tech>
# date    : 2025/08/20 (modernized)
# ----------------------------------------------------------------------------


# ----------------------------------------------------------------------------
# brief   : general configuration.
# note    : -
# ----------------------------------------------------------------------------
# Detect OS and set shell path accordingly
if-shell 'test "$(uname)" = "Darwin"' \
    'set-option -g default-shell /bin/zsh' \
    'set-option -g default-shell /usr/bin/zsh'

# Terminal type: use tmux-256color for better color support
set-option -g default-terminal "tmux-256color"

# Terminal overrides for True Color support
# macOS (iTerm2, Terminal.app) and Linux terminals
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -ga terminal-overrides ",screen-256color:Tc"
set-option -ga terminal-overrides ",tmux-256color:Tc"
# macOS specific terminal types
set-option -ga terminal-overrides ",*256col*:Tc"

# Enable mouse support
set -g mouse on

# Enable clipboard integration for automatic copy on selection (macOS)
# This allows text selected with mouse to be automatically copied to clipboard
set -g set-clipboard on

# macOS: Make mouse text selection inside tmux copy to the system clipboard
# When you drag to select text in tmux, it will automatically copy to macOS clipboard
if-shell 'test "$(uname)" = "Darwin"' \
    'bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"; \
     bind-key -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"; \
     bind-key -T copy-mode-vi DoubleClick1Pane  select-pane \; send -X select-word \; send -X copy-pipe-and-cancel "pbcopy"; \
     bind-key -T copy-mode    DoubleClick1Pane  select-pane \; send -X select-word \; send -X copy-pipe-and-cancel "pbcopy"; \
     bind-key -T copy-mode-vi TripleClick1Pane   select-pane \; send -X select-line \; send -X copy-pipe-and-cancel "pbcopy"; \
     bind-key -T copy-mode    TripleClick1Pane   select-pane \; send -X select-line \; send -X copy-pipe-and-cancel "pbcopy"; \
     bind-key -T copy-mode-vi Enter              send -X copy-pipe-and-cancel "pbcopy"; \
     bind-key -T copy-mode    Enter              send -X copy-pipe-and-cancel "pbcopy"'

set-option -g status-interval 1
set-option -g status-justify left


# ----------------------------------------------------------------------------
# brief   : keybind configuration.
# note    : -
# ----------------------------------------------------------------------------
# prefix key
set -g prefix C-t
unbind b

# key delay
set -sg escape-time 0

# keybinds
bind r source-file ~/.tmux.conf \; display "Configuration reloaded."
bind | split-window -hc "#{pane_current_path}"
bind - split-window -vc "#{pane_current_path}"
bind n select-pane -D
bind p select-pane -U
bind f select-pane -R
bind b select-pane -L


# ----------------------------------------------------------------------------
# brief   : appearance configuration.
# note    : solarized dark, dependence terminal system color conf.
# ----------------------------------------------------------------------------
# start index number from 1
set -g base-index 1
set -g pane-base-index 1

# statusbar (basic settings for powerline compatibility)
set-option -g status-position top
set-option -g status-left-length 60
set-option -g status-right-length 120

# pane border
set-option -g pane-border-style fg=black
set-option -g pane-active-border-style fg=yellow

# message text
set-option -g message-style bg=black,fg=red

# pane number display
set-option -g display-panes-active-colour blue
set-option -g display-panes-colour yellow

# Window monitoring
set-window-option -g monitor-activity on
set-option -g visual-activity off

# Clock mode
set-window-option -g clock-mode-colour cyan
set-window-option -g clock-mode-style 24

# powerline
# Note: Powerline looks for config in $XDG_CONFIG_HOME/powerline or ~/.config/powerline
# Create symlink: ln -s ~/dotfiles/conf/powerline ~/.config/powerline
# Or set POWERLINE_CONFIG_PATH environment variable in .zshenv
if-shell 'test "$(uname)" = "Darwin"' \
    'run-shell "if [ -n \"$POWERLINE_CONFIG_COMMAND\" ]; then $POWERLINE_CONFIG_COMMAND tmux setup; else python3 -m powerline.config tmux setup; fi"' \
    'run-shell "if [ -n \"$POWERLINE_CONFIG_COMMAND\" ]; then $POWERLINE_CONFIG_COMMAND tmux setup; else powerline-config tmux setup; fi"'
